spring:
  application:
    name: stockconnect

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${APP_PORT:8080}

# JWT Configuration
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration-ms: 900000        # 15 minutes (access token)
  refresh-expiration-ms: 604800000  # 7 days (refresh token)

# Super Admin seed credentials (used once at startup if no SUPER_ADMIN exists)
app:
  super-admin:
    full-name: ${SUPERADMIN_NAME}
    email: ${SUPERADMIN_EMAIL}
    password: ${SUPERADMIN_PASSWORD}
    phone-number: "${SUPERADMIN_PHONENUMBER}"

